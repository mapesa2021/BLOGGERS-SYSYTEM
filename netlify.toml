[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# API routes - redirect to Netlify functions
[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

# Handle dynamic routes - redirect to index.html for client-side routing
[[redirects]]
  from = "/page/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

# Catch all for SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
