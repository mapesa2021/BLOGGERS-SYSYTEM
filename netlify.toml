[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# Handle Next.js dynamic routes
[[redirects]]
  from = "/page/*"
  to = "/page/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# API routes should work with Next.js serverless functions
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# Catch all for SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
