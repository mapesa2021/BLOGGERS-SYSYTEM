[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# Next.js on Netlify configuration
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Handle dynamic routes
[[redirects]]
  from = "/page/*"
  to = "/page/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# Catch all for SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
